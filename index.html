<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mumtaz Queen of Cakes</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #fff5f7;
}

header {
    background: linear-gradient(45deg,#ff4d6d,#ff8fa3);
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
}

.tagline {
    text-align: center;
    padding: 10px;
    color: #555;
}

.cakes {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    text-align: center;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.price {
    font-weight: bold;
    margin: 10px 0;
}

button {
    background: #25D366;
    color: white;
    border: none;
    padding: 12px;
    width: 80%;
    margin-bottom: 15px;
    border-radius: 8px;
    font-size: 15px;
}

footer {
    text-align: center;
    padding: 15px;
    background: #ffccd5;
}
</style>
</head>

<body>

<header>🎂 Mumtaz Queen of Cakes</header>

<div class="tagline">
Ahmedabad | Eggless | Custom Cakes ❤️
</div>

<section class="cakes">

<div class="card">
<img src="https://i.imgur.com/8Km9tLL.jpg">
<h3>Designer Cake</h3>
<p class="price">₹1200</p>
<button onclick="order('Designer Cake ₹1200')">Order on WhatsApp</button>
</div>

<div class="card">
<img src="https://i.imgur.com/0y0y0y0.jpg">
<h3>Birthday Cake</h3>
<p class="price">₹1000</p>
<button onclick="order('Birthday Cake ₹1000')">Order on WhatsApp</button>
</div>

<div class="card">
<img src="https://i.imgur.com/abcd123.jpg">
<h3>Wedding Cake</h3>
<p class="price">₹2000</p>
<button onclick="order('Wedding Cake ₹2000')">Order on WhatsApp</button>
</div>

</section>

<footer>
UPI: dawars211-1@oksbi
</footer>

<script>
function order(product) {
let phone = "919978617863";
let msg = "Hello, mujhe ye cake order karna hai: " + product;
let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);
window.open(url, "_blank");
}
</script>

</body>
</html>
