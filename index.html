<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bobby Cakes</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #fff0f3;
}

header {
    background: #ff4d6d;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 24px;
}

.cakes {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.price {
    font-weight: bold;
    margin: 10px 0;
}

button {
    background: #25D366;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
}

</style>
</head>

<body>

<header>🎂 Bobby Cakes</header>

<section class="cakes">

<div class="card">
    <img src="https://source.unsplash.com/300x200/?chocolate-cake">
    <h3>Chocolate Cake</h3>
    <p class="price">₹499</p>
    <button onclick="order('Chocolate Cake ₹499')">Order on WhatsApp</button>
</div>

<div class="card">
    <img src="https://source.unsplash.com/300x200/?birthday-cake">
    <h3>Birthday Cake</h3>
    <p class="price">₹699</p>
    <button onclick="order('Birthday Cake ₹699')">Order on WhatsApp</button>
</div>

<div class="card">
    <img src="https://source.unsplash.com/300x200/?strawberry-cake">
    <h3>Strawberry Cake</h3>
    <p class="price">₹599</p>
    <button onclick="order('Strawberry Cake ₹599')">Order on WhatsApp</button>
</div>

</section>

<script>
function order(product) {
    let phone = "919978617863"; // apna number

let msg = "Hello, mujhe ye cake order karna hai: " + product;

let url = "https://wa.me/" + phone + "?text=" + encodeURIComponent(msg);

window.open(url, "_blank");
}
</script>

</body>
</html>
